version: '3.9'

services:
  app:
    build: ./app
    container_name: app
    depends_on:
      - db
    networks:
      - mynet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 5s
      retries: 5

  db:
      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      retries: 5
      image: postgres:15
    container_name: db
    environment:
          DB_HOST: db
          DB_NAME: mydb
          DB_USER: user
          DB_PASSWORD: pass
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - mynet

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - mynet

  env_file:
    - .env

networks:
  mynet:

volumes:
  db_data:
